<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Import/Export SN</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent-1: #00d4aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .auth-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-1);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .auth-card p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-1);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #00d4aa, #00a085);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.3s;
        }
        .btn-login:hover { opacity: 0.9; }
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-link a {
            color: var(--accent-1);
            text-decoration: none;
        }
        .error-msg {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .success-msg {
            background: rgba(0,212,170,0.2);
            color: #00d4aa;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Connexion</h1>
        <p class="subtitle">Système de Suivi Import/Export du Sénégal</p>

        {% if messages %}
            {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error-msg{% else %}success-msg{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Mot de passe</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <div class="auth-link">
            Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
        </div>
    </div>
</body>
</html>
